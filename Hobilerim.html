<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Hobilerim</title>

<body>

<nav>

<h1 class="fade-in">Hobilerim</h1>
<p>Futbol, Doğa Yürüyüşü ve Balık Tutmak</p>

<!-- Uzaktan Algılama Animasyonu -->
<div class="space">
  <div class="earth"></div>
  <div class="orbit">
    <div class="satellite"></div>
  </div>
</div>

<!-- Harita -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  var map = L.map('map').setView([39.0, 35.0], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  L.marker([39.91, 32.61]).addTo(map).bindPopup("Ankara");
  L.marker([40.50, 32.70]).addTo(map).bindPopup("Kızılcahamam");
  L.marker([40.31, 32.93]).addTo(map).bindPopup("Baraj Göleti");
});
</script>

</body>
</html>
