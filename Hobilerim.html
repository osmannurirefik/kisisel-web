<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Hobilerim</title>
  <link rel="stylesheet" href="Style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Eğer style.css dosyan yüklenmezse diye harita yüksekliğini buraya da ekliyorum */
    #map { 
      height: 450px; 
      width: 100%; 
      margin-top: 20px; 
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Hakkımda</a> |
  <a href="Hobilerim.html">Hobilerim</a> |
  <a href="iletisim.html">İletişim</a>
</nav>

<div class="fade-in">
  <h1>Hobilerim</h1>
  <p>Futbol, Doğa Yürüyüşü ve Balık Tutmak</p>
</div>

<div class="space">
  <div class="earth"></div>
  <div class="orbit">
    <div class="satellite"></div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Sayfa tamamen yüklendiğinde haritayı başlat
  document.addEventListener("DOMContentLoaded", function() {
    
    // Haritayı oluştur (Ankara merkezli)
    var map = L.map('map').setView([39.93, 32.85], 9);

    // Uydu Katmanı (Esri World Imagery)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri'
    }).addTo(map);

    // İşaretçiler
    L.marker([39.91, 32.61]).addTo(map).bindPopup("<b>Bakanlık Yerleşkesi</b>");
    L.marker([40.50, 32.70]).addTo(map).bindPopup("Kızılcahamam Doğa Yürüyüşü");
    L.marker([40.31, 32.93]).addTo(map).bindPopup("Balık Tutma Alanı");
  });
</script>

</body>
</html>
